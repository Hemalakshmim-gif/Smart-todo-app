<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart To-Do</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 Protect page -->
<script>
  const user = localStorage.getItem("user");
  if (!user) {
    window.location.href = "auth.html";
  }
</script>

<div class="app">

  <div class="header">
    <h1>🌿 Smart To-Do</h1>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="moods">
    <button onclick="setMood('Happy')">😊</button>
    <button onclick="setMood('Stressed')">😣</button>
    <button onclick="setMood('Tired')">😴</button>
  </div>

  <p id="moodText"></p>

  <div class="task-form">
    <input id="title" placeholder="Enter task">

    <select id="priority">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <select id="mood">
      <option>Happy</option>
      <option>Stressed</option>
      <option>Tired</option>
    </select>

    <button onclick="addTask()">+ Add</button>
  </div>

  <div class="actions">
    <button onclick="getTasks()">All</button>
    <button onclick="smartSuggest()">Smart</button>
  </div>

  <div id="taskList"></div>

</div>

<script src="script.js"></script>
</body>
</html>
