<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart To-Do</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>🌿 Smart To-Do</h1>
      <p>Plan tasks based on your mood</p>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- MOOD SELECTOR -->
  <div class="moods">
    <button onclick="setMood('Happy')">😊</button>
    <button onclick="setMood('Stressed')">😣</button>
    <button onclick="setMood('Tired')">😴</button>
  </div>

  <p id="moodText" class="moodText"></p>

  <!-- ADD TASK -->
  <div class="task-form">
    <input type="text" id="title" placeholder="Enter your task...">

    <select id="priority">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <select id="mood">
      <option>Happy</option>
      <option>Stressed</option>
      <option>Tired</option>
    </select>

    <button onclick="addTask()">+ Add</button>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button onclick="getTasks()">All Tasks</button>
    <button class="smart" onclick="smartSuggest()">🎯 Smart Suggest</button>
  </div>

  <!-- TASK LIST -->
  <div id="taskList" class="task-list"></div>

</div>

<script src="script.js"></script>
</body>
</html>
